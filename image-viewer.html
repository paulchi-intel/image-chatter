<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Chatter</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      background: #0f172a;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .viewer-header {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      min-height: 48px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(12px);
    }
    #imageName {
      overflow: hidden;
      font-size: 14px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #viewerStatus {
      margin-left: auto;
      color: #94a3b8;
      font-size: 12px;
    }
    .viewer-main {
      flex: 1;
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 24px;
    }
    #viewerImage {
      display: none;
      max-width: 100%;
      max-height: calc(100vh - 96px);
      object-fit: contain;
      border-radius: 4px;
      background: #fff;
      box-shadow: 0 20px 54px rgba(0, 0, 0, 0.38);
    }
    #viewerImage.ready { display: block; }
    #viewerMessage {
      max-width: 520px;
      padding: 18px 22px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: rgba(30, 41, 59, 0.72);
      color: #cbd5e1;
      line-height: 1.6;
      text-align: center;
    }
    #viewerMessage[hidden] { display: none; }
  </style>
</head>
<body>
  <header class="viewer-header">
    <div id="imageName">Image Chatter</div>
    <div id="viewerStatus"></div>
  </header>
  <main class="viewer-main">
    <div id="viewerMessage">正在載入圖片…</div>
    <img id="viewerImage" alt="">
  </main>
  <script src="image-viewer.js"></script>
</body>
</html>
